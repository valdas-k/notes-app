<!DOCTYPE html>
<html lang="en-us">
  <head>
    <title>Notes App</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/styles/index.css">
    <link rel="icon" type="image/x-icon" href="assets/icons/pen.svg">
  </head>
  <body>
    <header id="header">
      <nav id="nav">
        <ul id="nav-list">
          <li><a href="./index.html">Index</a></li>
          <li><a href="src/description.html">Description</a></li>
          <li><a href="src/contacts.html">Contacts</a></li>
        </ul>
      </nav>
    </header>
    <section id="new-note">
      <h1 class="section-header">Write a Note:</h1>
      <div class="note-input">
        <label for="new-note-title">Title</label>
        <input type="text" id="new-note-title" name="new-note-title" maxlength="12">
      </div>
      <div class="note-input">
        <label for="new-note-description">Description</label>
        <textarea id="new-note-description" name="new-note-description" maxlength="150"></textarea>
      </div>
      <div id="new-note-controls">
        <button type="submit" onclick="addNote()" id="add-note">Add Note</button>
        <button type="button" onclick="resetNote()" id="reset-note">Reset Note</button>
      </div>
    </section>
    <section id="note-list">
      <h2 class="section-header" id="list-header">Saved Notes:</h2>
      <div id="saved-notes">
      </div>
    </section>
    <script src="assets/scripts/form.js"></script>
</html>
