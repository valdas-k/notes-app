<!DOCTYPE html>
<html lang="en-us">
  <head>
    <title>Notes App</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/styles/index.css">
    <link rel="icon" type="image/x-icon" href="assets/icons/pen.svg">
  </head>
  <body>
    <header id="header">
      <nav>
        <ul class="links-list">
          <li><a href="./index.html">Index</a></li>
          <li><a href="src/description.html">Description</a></li>
        </ul>
      </nav>
    </header>
    <section id="new-note">
      <h1 class="section-header">Write a note:</h1>
      <div class="note-input">
        <label for="new-note-title">Title</label>
        <input type="text" id="new-note-title" name="new-note-title" maxlength="12">
      </div>
      <div class="note-input">
        <label for="new-note-description">Description</label>
        <textarea id="new-note-description" name="new-note-description" maxlength="150"></textarea>
      </div>
      <input type="hidden" id="new-note-id" name="new-note-id" value="">
      <div id="new-note-controls">
        <button type="submit" id="add-note">Add note</button>
        <button type="button" id="reset-note">Reset note</button>
      </div>
    </section>
    <section id="modal">
      <div id="modal-content">
        <button id="modal-cancel">&times;</button>
        <p id="modal-message"></p>
        <button id="modal-delete">Delete</button>
      </div>
    </section>
    <section id="note-list">
      <div id="header-container">
        <h2 class="section-header" id="list-header">Saved notes:</h2>
        <button id="download-notes">Download notes</button>
      </div>
      <div id="saved-notes"></div>
      <button id="delete-all-notes">Delete all notes</button>
    </section>
    <footer id="footer">
      <div>
        <ul class="links-list">
          <li><a href="./index.html">Index</a></li>
          <li><a href="src/description.html">Description</a></li>
        </ul>
      </div>
      <hr id="footer-divider">
      <a href="https://github.com/valdas-k"><img src="assets/icons/github.svg" id="contacts-icon"></a>
    </footer>
    <script src="assets/scripts/form.js"></script>
  </body>
</html>
